<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Blog TalkGlobal | Notícias e oportunidades</title>
<meta name="description" content="Notícias, análises e guias sobre trabalho, renda, tecnologia e oportunidades digitais." />

<link rel="icon" href="/favicon-32x32.png">

<style>
:root{
  --green:#23c552;
  --text:#111827;
  --muted:#64748b;
  --line:#e5e7eb;
  --soft:#f8fafc;
  --max:1100px;
}

*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
  background:#fff;
  color:var(--text);
}

.container{
  width:min(100% - 32px,var(--max));
  margin:auto;
}

/* HEADER */
.topbar{
  border-bottom:1px solid var(--line);
  position:sticky;
  top:0;
  background:#fff;
}

.nav{
  display:flex;
  justify-content:space-between;
  align-items:center;
  min-height:70px;
}

.brand{
  font-weight:900;
  font-size:1.2rem;
}

/* HERO */
.hero{
  padding:40px 0;
  border-bottom:1px solid var(--line);
}

.hero h1{
  font-size:clamp(2rem,5vw,3rem);
  margin-bottom:10px;
}

.hero p{
  color:var(--muted);
}

/* FEED */
.feed{
  margin-top:20px;
}

.feed a{
  display:block;
  padding:22px 0;
  border-bottom:1px solid var(--line);
}

.tag{
  font-size:.75rem;
  font-weight:900;
  color:var(--green);
  text-transform:uppercase;
}

.feed strong{
  display:block;
  font-size:1.3rem;
  margin-top:6px;
}

.feed p{
  color:var(--muted);
  margin-top:6px;
}

/* FOOTER */
.footer{
  padding:30px 0;
  border-top:1px solid var(--line);
  margin-top:40px;
  color:var(--muted);
  display:flex;
  justify-content:space-between;
  flex-wrap:wrap;
}
</style>
</head>

<body>

<header class="topbar">
  <div class="container nav">
    <div class="brand">TalkGlobal</div>
    <div>
      <a href="/">Início</a>
    </div>
  </div>
</header>

<main class="container">

<section class="hero">
  <h1>Notícias, análises e oportunidades</h1>
  <p>Conteúdos para quem quer entender mercado, tecnologia e novas formas de gerar renda.</p>
</section>

<!-- FEED AUTOMÁTICO -->
<div class="feed"></div>

</main>

<footer class="footer container">
  <p>© 2026 TalkGlobal. Todos os direitos reservados.</p>
</footer>

<!-- POSTS -->
<script src="/posts.js"></script>

<!-- GERADOR DO FEED -->
<script>
const feed = document.querySelector(".feed");

feed.innerHTML = posts.map(post => `
  <a href="${post.link}">
    <span class="tag">${post.categoria}</span>
    <strong>${post.titulo}</strong>
    <p>${post.descricao}</p>
  </a>
`).join("");
</script>

</body>
</html>
