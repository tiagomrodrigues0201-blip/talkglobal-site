<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leitor do Eco | Ecos de Hélicon</title>
<meta name="description" content="Leitor vertical público para Ecos aprovados em Hélicon, com páginas otimizadas para leitura mobile.">
<link rel="canonical" href="https://talkglobalapp.com/ecos/obra/">

<style>
  .ecos-reader {
    display: grid;
    gap: 10px;
    margin: 0 auto 48px;
    max-width: 860px;
    width: min(100%, 860px);
  }

  .ecos-reader-page {
    background: #050202;
    border: 1px solid rgba(255, 244, 225, 0.08);
    margin: 0;
    overflow: hidden;
  }

  .ecos-reader-page img {
    display: block;
    height: auto;
    width: 100%;
  }

  .ecos-reader-empty {
    border: 1px solid rgba(245, 213, 168, 0.18);
    background: rgba(14, 7, 5, 0.78);
    margin: 0 auto 48px;
    max-width: 760px;
    padding: clamp(22px, 7vw, 40px);
  }

  .ecos-reader-empty h2 {
    color: #fff4e1;
    font-size: clamp(1.5rem, 8vw, 2.4rem);
    line-height: 1.05;
    margin: 10px 0 12px;
  }

  .ecos-reader-empty p {
    color: rgba(255, 244, 225, 0.78);
    margin: 0;
  }
</style>
</head>
<body class="ecos-page ecos-work-page">
  <div class="archive-grain" aria-hidden="true"></div>
  <header class="topbar">
    <div class="container nav">
      <a href="/ecos/" class="brand" aria-label="Ecos de Hélicon"><img src="/public/studios/hesidio-logo-site.png" alt="" width="38" height="38"><span>Ecos de Hélicon</span></a>
      <nav class="menu" aria-label="Navegação principal">
        <a href="/">Home</a><a href="/hesidio/">HESIDIO</a><a href="/manga/">Episódios</a><a href="/artigos/">Artigos</a><a href="/ecos/">HÉLICON</a><a href="/contato.html">Contato</a>
      </nav>
    </div>
  </header>

  <main class="container ecos-form-shell" data-ecos-approved-detail>
    <section class="ecos-form-intro">
      <span class="kicker">CARREGANDO ECO</span>
      <h1>Buscando registro aprovado</h1>
      <p>Apenas envios com status aprovado podem aparecer nesta visualização pública local.</p>
    </section>
  </main>

  <script src="/assets/ecos-approved.js" defer></script>
