<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>Ganhar em dólar, freelancer e tecnologia | TalkGlobal</title>

<meta name="description" content="Guias premium para quem quer ganhar em dólar, trabalhar como freelancer internacional e usar tecnologia para evoluir com consistência. Sem promessas irreais." />

<!-- 🔥 FAVICON CORRETO -->
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
<link rel="shortcut icon" href="/favicon-32x32.png">

<style>
:root{
  --bg:#030b17;
  --bg2:#07111f;
  --card:rgba(255,255,255,.055);
  --line:rgba(255,255,255,.09);
  --text:#f5f7fb;
  --muted:#9aa8c2;
  --green:#23c552;
  --green2:#19ae46;
  --blue:#2f67ea;
  --radius:28px;
  --max:1180px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{
  background:#030b17;
  overscroll-behavior:none;
}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
  color:var(--text);
  line-height:1.6;
  background:
    radial-gradient(circle at 15% 0%, rgba(35,197,82,.16), transparent 26%),
    radial-gradient(circle at 88% 10%, rgba(47,103,234,.20), transparent 24%),
    linear-gradient(180deg,#020816 0%,#041022 48%,#07111f 100%);
}
a{color:inherit;text-decoration:none}
.container{
  width:min(100% - 32px,var(--max));
  margin:auto;
}
.topbar{
  position:sticky;
  top:0;
  z-index:50;
  backdrop-filter:blur(16px);
  background:rgba(3,11,23,.82);
  border-bottom:1px solid var(--line);
}
.nav{
  min-height:82px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:24px;
}
.brand{
  display:flex;
  align-items:center;
  gap:12px;
  font-weight:900;
  font-size:1.12rem;
}
.brand img{
  width:44px;
  height:44px;
  border-radius:14px;
  box-shadow:0 12px 30px rgba(35,197,82,.16);
}
.menu{
  display:flex;
  align-items:center;
  gap:24px;
  color:#cbd6e8;
  font-weight:700;
  flex-wrap:wrap;
}
.menu a:hover{color:#fff}
.btn{
  min-height:56px;
  padding:0 24px;
  border-radius:17px;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  font-weight:900;
  background:linear-gradient(135deg,var(--green),var(--green2));
  color:#06110a;
  box-shadow:0 16px 36px rgba(35,197,82,.22);
  transition:.22s ease;
}
.btn:hover{transform:translateY(-2px)}
.btn.secondary{
  background:rgba(255,255,255,.055);
  border:1px solid var(--line);
  color:#f5f7fb;
  box-shadow:none;
}
.hero{
  padding:92px 0 58px;
}
.pill{
  display:inline-flex;
  padding:10px 17px;
  border-radius:999px;
  background:rgba(47,103,234,.18);
  border:1px solid rgba(255,255,255,.09);
  color:#dbe7ff;
  font-weight:900;
  margin-bottom:26px;
}
h1{
  font-size:clamp(3.2rem,7vw,6.6rem);
  line-height:.94;
  letter-spacing:-.075em;
  max-width:980px;
  margin-bottom:26px;
}
.accent{
  background:linear-gradient(135deg,#fff 5%,#d7e2ff 45%,#86f5aa 85%);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}
.lead{
  color:var(--muted);
  font-size:1.16rem;
  max-width:760px;
  margin-bottom:30px;
}
.hero-actions{
  display:flex;
  gap:14px;
  flex-wrap:wrap;
}
.stats{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:18px;
  margin-top:46px;
}
.stat{
  background:rgba(255,255,255,.045);
  border:1px solid var(--line);
  border-radius:22px;
  padding:22px;
}
.stat strong{
  display:block;
  font-size:1.5rem;
  margin-bottom:4px;
}
.stat span{color:var(--muted)}
.section{
  padding:58px 0;
}
.tag{
  color:#7df2a2;
  font-weight:900;
  letter-spacing:.08em;
  text-transform:uppercase;
  font-size:.86rem;
  margin-bottom:10px;
}
h2{
  font-size:clamp(2.2rem,4vw,4.1rem);
  line-height:.98;
  letter-spacing:-.055em;
  max-width:920px;
  margin-bottom:26px;
}
.grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:24px;
}
.card{
  background:linear-gradient(180deg,rgba(255,255,255,.06),rgba(255,255,255,.032));
  border:1px solid var(--line);
  border-radius:30px;
  padding:30px;
  min-height:245px;
  transition:.22s ease;
  position:relative;
  overflow:hidden;
}
.card:before{
  content:"";
  position:absolute;
  inset:auto 0 0 0;
  height:2px;
  background:linear-gradient(90deg,var(--green),var(--blue));
  opacity:.65;
}
.card:hover{
  transform:translateY(-5px);
  border-color:rgba(35,197,82,.28);
}
.card small{
  color:#7df2a2;
  font-weight:900;
  letter-spacing:.06em;
}
.card h3{
  font-size:1.55rem;
  line-height:1.12;
  margin:15px 0 12px;
}
.card p{color:var(--muted)}
.callout{
  background:
    radial-gradient(circle at top right,rgba(35,197,82,.16),transparent 26%),
    radial-gradient(circle at bottom left,rgba(47,103,234,.16),transparent 26%),
    linear-gradient(180deg,rgba(255,255,255,.065),rgba(255,255,255,.035));
  border:1px solid rgba(35,197,82,.16);
  border-radius:36px;
  padding:42px;
}
.callout h2{margin-bottom:18px}
.footer{
  margin-top:54px;
  padding:38px 0;
  border-top:1px solid var(--line);
  color:var(--muted);
  font-size:.94rem;
}
.footer-row{
  display:flex;
  justify-content:space-between;
  gap:20px;
  flex-wrap:wrap;
}
.footer a:hover{color:#fff}
</style>
</head>
<body>
<!-- resto do seu HTML permanece igual -->
</body>
</html>
